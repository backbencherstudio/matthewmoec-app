name: matthewmoec_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_localization: ^0.4.0
  flutter_riverpod: ^2.5.1
  flutter_screenutil: ^5.9.3
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  dio: ^5.9.2
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
   - assets/localization/
   - assets/logos/
   - assets/icons/
   - assets/images/
   - .env

